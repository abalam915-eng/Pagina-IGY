<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda tu cita - Instituto Geriatrico de Yucatan</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- HEADER: misma navegacion que la pagina principal -->
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="Inicio IGY">
            <img src="img/Logos/LogPage.png" alt="Logo Instituto Geriatrico de Yucatan" class="brand-logo">
        </a>

        <nav class="main-nav" aria-label="Navegacion principal">
            <a href="index.html">Inicio</a>
            <a href="agenda.html" class="active">Agenda tu cita</a>
            <a href="https://vitamayor-demo.local" target="_blank" rel="noreferrer">VitaMayor</a>
        </nav>
    </header>

    <main class="agenda-page">
        <!-- AGENDA SIMPLE: formulario corto pedido por cliente -->
        <section class="agenda-hero">
            <div class="agenda-copy">
                <p class="eyebrow">Agenda tu cita</p>
                <h1>Hablemos sobre el cuidado de tu familiar</h1>
                <p>
                    Comparte tu nombre y telefono. Nuestro equipo se pondra en contacto contigo para orientarte y
                    coordinar una visita.
                </p>
            </div>

            <form class="appointment-card appointment-form" data-form-location="agenda">
                <label>
                    Nombre
                    <input type="text" name="nombre" placeholder="Ej. Ana Perez" required>
                </label>
                <label>
                    Telefono de contacto
                    <input type="tel" name="telefono" placeholder="Ej. 999 123 4567" required>
                </label>
                <button class="btn btn-primary" type="submit">Agendar cita</button>
                <p class="form-message" role="status" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Instituto Geriatrico de Yucatan A.C.</p>
        <div class="footer-links">
            <a href="index.html#contacto">Contacto</a>
            <a href="https://vitamayor-demo.local" target="_blank" rel="noreferrer">VitaMayor</a>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
